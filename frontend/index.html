<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCMS - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🎓 Smart Classroom</h1>
                <h2>Management System</h2>
            </div>

            <div class="auth-tabs" style="display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd;">
                <button id="showLoginBtn" style="flex: 1; padding: 10px; background: transparent; border: none; border-bottom: 2px solid #007bff; font-weight: bold; color: #007bff; cursor: pointer;">Login</button>
                <button id="showRegisterBtn" style="flex: 1; padding: 10px; background: transparent; border: none; border-bottom: 2px solid transparent; font-weight: bold; color: #666; cursor: pointer;">Register</button>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="role">Login As</label>
                    <select id="role" name="role" required>
                        <option value="">Select Role</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div id="loginErrorMessage" class="error-message" style="display: none;"></div>
                <div id="loginSuccessMessage" class="success-message" style="display: none; color: green; margin-bottom: 15px; font-weight: bold; text-align: center;"></div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <form id="registerForm" class="login-form" style="display: none;">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" name="username" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label for="regFullName">Full Name</label>
                    <input type="text" id="regFullName" name="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address (Optional)</label>
                    <input type="email" id="regEmail" name="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="regRole">Register As</label>
                    <select id="regRole" name="role" required>
                        <option value="">Select Role</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>

                <div id="regErrorMessage" class="error-message" style="display: none; color: red; margin-bottom: 15px; text-align: center;"></div>

                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <div class="login-footer">
                <p><strong>Demo Credentials:</strong></p>
                <p>Student: student1 / student123</p>
                <p>Teacher: teacher1 / teacher123</p>
                <p>Admin: admin / admin123</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
